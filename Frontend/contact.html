<script>
document.addEventListener("DOMContentLoaded", () => {
  const finePointer = window.matchMedia("(hover: hover) and (pointer: fine)");
  if (!finePointer.matches) return;

  const cursor = document.querySelector(".lux-cursor");
  const trailContainer = document.querySelector(".lux-cursor-trail");
  const hoverSelector = `
    a,
    button,
    input,
    textarea,
    select,
    label,
    [role="button"],
    .service-item,
    .creative-offering-item,
    .agency-grid-item
  `;

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  let cursorX = mouseX;
  let cursorY = mouseY;

  let visible = false;

  /* longer trail */
  const TRAIL_COUNT = 12;
  const trailPieces = [];

  for (let i = 0; i < TRAIL_COUNT; i++) {
    const piece = document.createElement("div");
    piece.className = "lux-cursor-trail-piece";
    trailContainer.appendChild(piece);

    trailPieces.push({
      el: piece,
      x: mouseX,
      y: mouseY
    });
  }

  function showCursor() {
    if (!visible) {
      visible = true;
      cursor.classList.add("is-visible");
      trailContainer.classList.add("is-visible");
    }
  }

  function hideCursor() {
    visible = false;
    cursor.classList.remove("is-visible", "is-hover", "is-clicking");
    trailContainer.classList.remove("is-visible");
  }

  document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    showCursor();

    const hovered = e.target.closest(hoverSelector);
    cursor.classList.toggle("is-hover", !!hovered);
  });

  document.addEventListener("mousedown", () => {
    cursor.classList.add("is-clicking");
  });

  document.addEventListener("mouseup", () => {
    cursor.classList.remove("is-clicking");
  });

  document.addEventListener("mouseleave", hideCursor);
  document.addEventListener("mouseenter", showCursor);
  window.addEventListener("blur", hideCursor);

  function animateCursor() {
    /* main cursor: very responsive */
    cursorX += (mouseX - cursorX) * 0.5;
    cursorY += (mouseY - cursorY) * 0.5;

    cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;

    /* trail: chained follow */
    let prevX = cursorX;
    let prevY = cursorY;

    trailPieces.forEach((piece, index) => {
      const ease = 0.22 - index * 0.01;
      piece.x += (prevX - piece.x) * Math.max(ease, 0.08);
      piece.y += (prevY - piece.y) * Math.max(ease, 0.08);

      const scale = 1 - index * 0.045;
      const opacity = 0.32 - index * 0.02;

      piece.el.style.transform = `
        translate3d(${piece.x}px, ${piece.y}px, 0)
        translate(-50%, -50%)
        rotate(45deg)
        scale(${scale})
      `;
      piece.el.style.opacity = Math.max(opacity, 0);

      prevX = piece.x;
      prevY = piece.y;
    });

    requestAnimationFrame(animateCursor);
  }

  animateCursor();

  window.addEventListener("resize", () => {
    if (!finePointer.matches) {
      hideCursor();
    }
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const hero = document.querySelector(".contact-hero-intro");
  const title = document.querySelector(".contact-hero-intro__title");

  if (!hero || !title) return;

  let ticking = false;

  function updateHeroFade() {
    const rect = hero.getBoundingClientRect();
    const vh = window.innerHeight || document.documentElement.clientHeight;

    const start = vh * 0.18;
    const end = -rect.height * 0.55;

    const progress = (rect.top - end) / (start - end);
    const clamped = Math.max(0, Math.min(1, progress));

    const opacity = clamped;
    const moveY = (1 - clamped) * -36;

    title.style.setProperty("--contactHeroOpacity", opacity.toFixed(3));
    title.style.setProperty("--contactHeroMove", `${moveY.toFixed(2)}px`);

    ticking = false;
  }

  function requestTick() {
    if (!ticking) {
      window.requestAnimationFrame(updateHeroFade);
      ticking = true;
    }
  }

  updateHeroFade();
  window.addEventListener("scroll", requestTick, { passive: true });
  window.addEventListener("resize", requestTick);
});
</script>
